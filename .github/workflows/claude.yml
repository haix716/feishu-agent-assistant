name: Claude Code

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Debug secrets
        run: |
          echo "ANTHROPIC_BASE_URL is set: ${{ secrets.ANTHROPIC_BASE_URL != '' }}"
          echo "ANTHROPIC_API_KEY is set: ${{ secrets.ANTHROPIC_API_KEY != '' }}"
          echo "ANTHROPIC_BASE_URL value: ${{ secrets.ANTHROPIC_BASE_URL }}"
          echo "Key length: $(echo -n '${{ secrets.ANTHROPIC_API_KEY }}' | wc -c)"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: mimo-v2.5-pro
          ANTHROPIC_DEFAULT_OPUS_MODEL: mimo-v2.5-pro
          ANTHROPIC_DEFAULT_SONNET_MODEL: mimo-v2.5-pro
          ANTHROPIC_DEFAULT_HAIKU_MODEL: mimo-v2.5-pro
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          trigger_phrase: "@claude"
          prompt: |
            This is a Claude-powered Feishu bot project (Node.js + TypeScript).
            Follow the project's CLAUDE.md for conventions.

            For PRs: review for bugs, security issues, and style problems.
            Run `npm test` and `npm run lint` to verify changes.

            For Issues (bug fixes), follow strict TDD:
            1. Read the issue carefully. If unclear, comment to ask for clarification — do NOT start coding.
            2. Write a failing test in tests/ that reproduces the bug described in the issue.
            3. Run `npm test` — confirm the new test FAILS.
               If it passes unexpectedly: stop, comment that the issue may not be reproducible, do NOT modify code.
            4. Fix the source code with minimal changes.
            5. Run `npm test` — confirm the new test PASSES and all old tests still pass.
            6. Run `npm run lint` — confirm zero errors.
            7. Create a PR with: issue link, root cause, fix description, test results.
